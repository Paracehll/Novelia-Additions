<!DOCTYPE html>
<html>
<head>
    <title>Mock Novelia</title>
    <style>
        h1, h2 { border: 1px solid black; padding: 10px; }
        .novelia-comment-wrapper { border: 1px dashed blue; }
        .novelia-copy-btn { border: 1px solid green; }
    </style>
</head>
<body>
    <h1 id="main-h1">Novel Title</h1>
    <h2 id="fav-h2">我的收藏</h2>
    <div class="n-flex" role="none">
        <a href="/novel/site1/123">Novel 123</a>
        <span>Novel 123 Title</span>
    </div>

    <script>
        // Mocking some environment variables and functions
        window.GM_setClipboard = (text) => { console.log("Clipboard set to:", text); };
        // Force the scripts to think we are on an allowed page
        window.__noveliaMockPath = "/novel/site1/123";

        // Mock fetch for comment API
        window.fetch = (url) => {
            console.log("Fetching:", url);
            return Promise.resolve({
                ok: true,
                status: 200,
                json: () => Promise.resolve({
                    pageNumber: 1,
                    items: [{ replyCount: 5 }]
                })
            });
        };
    </script>

    <!-- The scripts will be injected here by Playwright for easier testing -->
</body>
</html>
